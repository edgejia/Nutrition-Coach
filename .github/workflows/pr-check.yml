name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_BASE_REF: ${{ github.base_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Run PR policy
        run: yarn pr:policy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run release gate
        id: release_gate
        run: yarn release:check --base="origin/${RELEASE_BASE_REF}"

      - name: Report failing test names
        if: ${{ always() && steps.release_gate.outcome == 'failure' }}
        run: |
          set -o pipefail
          yarn test 2>&1 | sed -n -E '/^[[:space:]#]*not ok [0-9]+ - /p'
