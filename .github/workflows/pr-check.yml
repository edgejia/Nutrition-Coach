name: PR Check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_ref:
        description: Base ref used for release-check diff context.
        required: false
        default: main
        type: string

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || inputs.base_ref || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Run PR policy
        if: github.event_name == 'pull_request'
        run: yarn pr:policy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run release gate
        run: yarn release:check --base=origin/${RELEASE_BASE_REF}
