name: PR Check

on:
  pull_request:
    branches:
      - staging
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run release gate
        run: yarn release:check --base=origin/${{ github.base_ref }}

