name: Manual Release Diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  manual-release-diagnostic:
    name: Manual Release Diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RELEASE_BASE_REF: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare CI environment
        run: cp .env.example .env

      - name: Run release diagnostic
        run: yarn release:check --base="origin/${RELEASE_BASE_REF}"
